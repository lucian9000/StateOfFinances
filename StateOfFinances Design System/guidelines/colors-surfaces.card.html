<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px;display:flex;gap:10px}.sw{flex:1;height:88px;border-radius:12px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;border:1px solid rgba(255,255,255,0.07)}.sw .name{font-family:var(--font-body);font-size:.6875rem;font-weight:500;color:var(--text)}.sw .hex{font-family:var(--font-mono);font-size:.6875rem;color:var(--text-muted)}</style>
</head><body>
<div class="sw" style="background:var(--bg)"><span class="name">--bg</span><span class="hex">#120E1F</span></div>
<div class="sw" style="background:var(--surface)"><span class="name">--surface</span><span class="hex">#1E1830</span></div>
<div class="sw" style="background:var(--surface-raised)"><span class="name">--surface-raised</span><span class="hex">#28203F</span></div>
</body></html>
