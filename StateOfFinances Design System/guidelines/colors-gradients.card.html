<!DOCTYPE html><html><head><meta charset="utf-8">

</head><body>
<div class="grad" style="background:var(--gradient-hero)"><span class="name">--gradient-hero</span><span class="val">surface-raised → violet/20 · 135°</span></div>
<div class="grad" style="background:var(--gradient-violet)"><span class="name">--gradient-violet</span><span class="val">#8b5cf6 → #6d28d9 · 135°</span></div>
</body></html>
