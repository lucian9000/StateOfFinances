<!-- @dsCard group="Spacing" viewport="700x120" name="Border Radius" subtitle="sm / md / lg / card / full — the corner system" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px 20px;background:var(--surface);display:flex;gap:10px;align-items:center}.box{width:70px;height:70px;background:var(--surface-raised);border:1px solid rgba(139,92,246,0.3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}.name{font-family:var(--font-body);font-size:.625rem;color:var(--text);font-weight:500}.val{font-family:var(--font-mono);font-size:.5625rem;color:var(--text-muted)}</style>
</head><body>
<div class="box" style="border-radius:var(--radius-sm)"><span class="name">sm</span><span class="val">8px</span></div>
<div class="box" style="border-radius:var(--radius-md)"><span class="name">md</span><span class="val">12px</span></div>
<div class="box" style="border-radius:var(--radius-lg)"><span class="name">lg</span><span class="val">16px</span></div>
<div class="box" style="border-radius:var(--radius-xl)"><span class="name">xl</span><span class="val">20px</span></div>
<div class="box" style="border-radius:var(--radius-card)"><span class="name">card</span><span class="val">24px</span></div>
<div class="box" style="border-radius:var(--radius-full)"><span class="name">full</span><span class="val">∞</span></div>
</body></html>
