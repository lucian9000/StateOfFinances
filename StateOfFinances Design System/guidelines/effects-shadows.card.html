<!-- @dsCard group="Spacing" viewport="700x140" name="Shadows & Glow" subtitle="Violet-tinted card shadow + glow tokens for future data viz" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:18px;background:var(--bg);display:flex;gap:12px;align-items:center}.box{flex:1;height:78px;border-radius:var(--radius-card);background:var(--surface-raised);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}.name{font-family:var(--font-body);font-size:.625rem;color:var(--text);font-weight:500;text-align:center}.val{font-family:var(--font-mono);font-size:.5rem;color:var(--text-muted);text-align:center;padding:0 6px}</style>
</head><body>
<div class="box" style="box-shadow:var(--shadow-sm)"><span class="name">shadow-sm</span><span class="val">black / 40%</span></div>
<div class="box" style="box-shadow:var(--shadow-card)"><span class="name">shadow-card</span><span class="val">violet / 10%</span></div>
<div class="box" style="box-shadow:var(--shadow-glow-violet)"><span class="name">glow-violet</span><span class="val">violet / 30%</span></div>
<div class="box" style="box-shadow:var(--shadow-glow-cyan)"><span class="name">glow-cyan</span><span class="val">cyan / 25%</span></div>
<div class="box" style="box-shadow:var(--shadow-glow-magenta)"><span class="name">glow-magenta</span><span class="val">magenta / 25%</span></div>
</body></html>
