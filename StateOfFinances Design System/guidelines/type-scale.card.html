<!-- @dsCard group="Type" viewport="700x260" name="Type Scale" subtitle="xs → 4xl — size tokens with live specimens" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:14px 18px;background:var(--surface);display:flex;flex-direction:column;gap:2px}.row{display:flex;align-items:baseline;gap:12px}.token{font-family:var(--font-mono);font-size:.5625rem;color:var(--text-muted);width:48px;flex-shrink:0}</style>
</head><body>
<div class="row"><span class="token">4xl · 36</span><span style="font-family:var(--font-display);font-size:var(--text-4xl);font-weight:700;color:var(--text)">Balance</span></div>
<div class="row"><span class="token">3xl · 30</span><span style="font-family:var(--font-display);font-size:var(--text-3xl);font-weight:700;color:var(--text)">Hello</span></div>
<div class="row"><span class="token">2xl · 24</span><span style="font-family:var(--font-display);font-size:var(--text-2xl);font-weight:600;color:var(--text)">Monthly</span></div>
<div class="row"><span class="token">xl · 20</span><span style="font-family:var(--font-display);font-size:var(--text-xl);font-weight:600;color:var(--text)">Transactions</span></div>
<div class="row"><span class="token">lg · 18</span><span style="font-family:var(--font-display);font-size:var(--text-lg);font-weight:600;color:var(--text)">This Week</span></div>
<div class="row"><span class="token">base · 16</span><span style="font-family:var(--font-body);font-size:var(--text-base);color:var(--text)">Receipt text or description</span></div>
<div class="row"><span class="token">sm · 14</span><span style="font-family:var(--font-body);font-size:var(--text-sm);color:var(--text-muted)">Category name · button label</span></div>
<div class="row"><span class="token">xs · 12</span><span style="font-family:var(--font-body);font-size:var(--text-xs);color:var(--text-muted)">Caption · timestamp · helper text</span></div>
</body></html>
