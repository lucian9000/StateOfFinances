<!-- @dsCard group="Colors" viewport="700x120" name="Text Colors" subtitle="--text · --text-muted — foreground tokens" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px 20px;background:var(--surface);display:flex;flex-direction:column;gap:14px}</style>
</head><body>
<div style="display:flex;align-items:center;gap:14px">
  <div style="width:36px;height:36px;border-radius:50%;background:var(--text);flex-shrink:0"></div>
  <div><p style="margin:0;font-family:var(--font-body);font-size:var(--text-sm);color:var(--text);font-weight:500">--text &nbsp;#F5F3FA</p><p style="margin:0;font-family:var(--font-body);font-size:var(--text-xs);color:var(--text-muted)">Primary — headings, balance numbers, labels, values</p></div>
</div>
<div style="display:flex;align-items:center;gap:14px">
  <div style="width:36px;height:36px;border-radius:50%;background:var(--text-muted);flex-shrink:0"></div>
  <div><p style="margin:0;font-family:var(--font-body);font-size:var(--text-sm);color:var(--text);font-weight:500">--text-muted &nbsp;#9C93B5</p><p style="margin:0;font-family:var(--font-body);font-size:var(--text-xs);color:var(--text-muted)">Secondary — captions, placeholder, inactive states</p></div>
</div>
</body></html>
