<!-- @dsCard group="Brand" viewport="700x110" name="Category Palette" subtitle="4-color cycling palette for ordered category lists" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:14px 20px;background:var(--surface);display:flex;align-items:center;gap:10px}.item{display:flex;align-items:center;gap:10px;flex:1}.circle{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--bg);flex-shrink:0}.meta{display:flex;flex-direction:column;gap:2px}.idx{font-family:var(--font-mono);font-size:.5rem;color:var(--text-muted)}.hex{font-family:var(--font-mono);font-size:.6875rem;color:var(--text)}</style>
</head><body>
<div class="item"><div class="circle" style="background:var(--category-0)">G</div><div class="meta"><span class="idx">i % 4 === 0</span><span class="hex">#8B5CF6</span></div></div>
<div class="item"><div class="circle" style="background:var(--category-1)">P</div><div class="meta"><span class="idx">i % 4 === 1</span><span class="hex">#E64FCC</span></div></div>
<div class="item"><div class="circle" style="background:var(--category-2)">S</div><div class="meta"><span class="idx">i % 4 === 2</span><span class="hex">#22D3EE</span></div></div>
<div class="item"><div class="circle" style="background:var(--category-3)">R</div><div class="meta"><span class="idx">i % 4 === 3</span><span class="hex">#F5A623</span></div></div>
</body></html>
