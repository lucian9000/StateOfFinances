<!-- @dsCard group="Colors" viewport="700x110" name="Alpha Tints" subtitle="20% opacity — icon badge well backgrounds" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:14px 20px;background:var(--surface);display:flex;gap:14px;align-items:center}.well{display:flex;flex-direction:column;align-items:center;gap:6px}.circle{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem}.label{font-family:var(--font-mono);font-size:.5625rem;color:var(--text-muted);text-align:center}</style>
</head><body>
<div class="well"><div class="circle" style="background:var(--violet-20);color:var(--violet)">◈</div><span class="label">violet/20</span></div>
<div class="well"><div class="circle" style="background:var(--magenta-20);color:var(--magenta)">↓</div><span class="label">magenta/20</span></div>
<div class="well"><div class="circle" style="background:var(--cyan-20);color:var(--cyan)">↑</div><span class="label">cyan/20</span></div>
<div class="well"><div class="circle" style="background:var(--amber-20);color:var(--amber)">★</div><span class="label">amber/20</span></div>
<div style="flex:1;padding-left:20px;border-left:1px solid rgba(255,255,255,0.08)"><p style="margin:0;font-family:var(--font-body);font-size:var(--text-xs);color:var(--text-muted);line-height:1.6">Used as icon badge wells in GoalCard stat icons, BalanceHeroCard, and category overview thumbnails. Always 20% opacity over the surface bg.</p></div>
</body></html>
