<!-- @dsCard group="Colors" viewport="700x140" name="Accent Colors" subtitle="Violet · Magenta · Cyan · Amber — financial semantic accents" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px;display:flex;gap:10px}.sw{flex:1;height:88px;border-radius:12px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px}.sw span{display:block;font-size:.6875rem;line-height:1.5}.sw .name{font-family:var(--font-body);font-weight:500}.sw .hex{font-family:var(--font-mono)}</style>
</head><body>
<div class="sw" style="background:var(--violet)"><span class="name">Violet / Primary</span><span class="hex">#8B5CF6</span></div>
<div class="sw" style="background:var(--magenta)"><span class="name">Magenta / Spend</span><span class="hex">#E64FCC</span></div>
<div class="sw" style="background:var(--cyan);color:#0c1117"><span class="name">Cyan / Income</span><span class="hex">#22D3EE</span></div>
<div class="sw" style="background:var(--amber);color:#1c1200"><span class="name">Amber / Goals</span><span class="hex">#F5A623</span></div>
</body></html>
