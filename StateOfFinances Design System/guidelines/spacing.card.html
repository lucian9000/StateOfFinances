<!-- @dsCard group="Spacing" viewport="700x120" name="Space Scale" subtitle="4px base unit — space-1 through space-12" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:14px 20px;background:var(--surface);display:flex;align-items:flex-end;gap:14px}.sp{display:flex;flex-direction:column;align-items:center;gap:5px}.bar{background:var(--violet);border-radius:3px;width:22px}.label{font-family:var(--font-mono);font-size:.5rem;color:var(--text-muted);text-align:center;line-height:1.3}</style>
</head><body>
<div class="sp"><div class="bar" style="height:var(--space-1)"></div><span class="label">1<br>4px</span></div>
<div class="sp"><div class="bar" style="height:var(--space-2)"></div><span class="label">2<br>8px</span></div>
<div class="sp"><div class="bar" style="height:var(--space-3)"></div><span class="label">3<br>12px</span></div>
<div class="sp"><div class="bar" style="height:var(--space-4)"></div><span class="label">4<br>16px</span></div>
<div class="sp"><div class="bar" style="height:var(--space-5)"></div><span class="label">5<br>20px</span></div>
<div class="sp"><div class="bar" style="height:var(--space-6)"></div><span class="label">6<br>24px</span></div>
<div class="sp"><div class="bar" style="height:var(--space-8)"></div><span class="label">8<br>32px</span></div>
<div class="sp"><div class="bar" style="height:var(--space-10)"></div><span class="label">10<br>40px</span></div>
<div class="sp"><div class="bar" style="height:var(--space-12)"></div><span class="label">12<br>48px</span></div>
</body></html>
