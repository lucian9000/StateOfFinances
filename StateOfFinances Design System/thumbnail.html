<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="styles.css">
<style>
*{margin:0;box-sizing:border-box}
html,body{width:1280px;height:854px;overflow:hidden}
.main{position:absolute;inset:0 25% 0 0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.swatches{position:absolute;inset:0 0 0 75%;display:flex;flex-direction:column}
.sw{flex:1}
</style>
</head><body>
<div class="main">
  <img src="assets/logo.png" alt="StateOfFinances" style="width:200px;height:200px;object-fit:contain">
  <p style="font-family:var(--font-display);font-size:1.625rem;font-weight:700;color:var(--text);letter-spacing:-.02em;text-align:center">StateOfFinances</p>
</div>
<div class="swatches">
  <div class="sw" style="background:var(--cyan)"></div>
  <div class="sw" style="background:var(--violet)"></div>
  <div class="sw" style="background:var(--magenta)"></div>
  <div class="sw" style="background:var(--amber)"></div>
</div>
</body></html>
